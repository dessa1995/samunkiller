<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사문 도표 마스터 클래스</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #f8fafc; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }
        .animate-fade-in { animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .table-input {
            width: 100%; min-width: 45px; height: 45px; text-align: center; font-weight: 800; font-size: 1.1rem;
            border: 2px solid transparent; border-radius: 8px; outline: none; transition: all 0.2s;
            background-color: #f1f5f9; color: #334155;
        }
        .table-input:focus { border-color: #6366f1; background-color: #e0e7ff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .table-input.correct { background-color: #dcfce7; color: #166534; border-color: #22c55e; }
        .table-input.wrong { background-color: #fee2e2; color: #991b1b; border-color: #ef4444; }
        .table-input.revealed { background-color: #fef08a; color: #854d0e; border-color: #eab308; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fade-in-up 0.3s ease-out; }
        
        .venn-circle { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); mix-blend-mode: multiply; }

        .math-fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 4px; }
        .math-fraction .num { border-bottom: 2px solid currentColor; padding: 0 4px; line-height: 1.2; }
        .math-fraction .den { padding: 0 4px; line-height: 1.2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Fraction = ({ num, den, className = "" }) => (
            <div className={`math-fraction font-black ${className}`}>
                <span className="num">{num}</span>
                <span className="den">{den}</span>
            </div>
        );

        const FeedCard = ({ title, tag, icon, children, likes }) => (
            <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 mb-8 animate-fade-in hover:shadow-md transition-shadow relative overflow-hidden">
                <div className="flex items-center gap-4 mb-5 pb-4 border-b border-slate-100">
                    <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center text-2xl shadow-inner border border-white">
                        {icon}
                    </div>
                    <div className="flex-1">
                        <span className="text-[10px] font-bold text-indigo-500 tracking-wider uppercase bg-indigo-50 px-2 py-1 rounded-md mb-1 inline-block">{tag}</span>
                        <h3 className="font-bold text-xl text-slate-800 leading-tight">{title}</h3>
                    </div>
                    <div className="flex flex-col items-center justify-center text-slate-400 hover:text-rose-500 transition-colors cursor-pointer">
                        <span className="text-xl">❤️</span>
                        <span className="text-xs font-bold mt-1">{likes}</span>
                    </div>
                </div>
                {children}
            </div>
        );

        const LevelLearner = ({ levels }) => {
            const [activeLevel, setActiveLevel] = useState(0);
            return (
                <div className="mt-5">
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide">
                        {levels.map((lvl, idx) => (
                            <button 
                                key={idx} 
                                onClick={() => setActiveLevel(idx)}
                                className={`flex-shrink-0 px-4 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 border ${
                                    activeLevel === idx 
                                    ? 'bg-slate-800 text-white border-slate-800 shadow-md transform scale-105' 
                                    : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                }`}
                            >
                                {lvl.title}
                            </button>
                        ))}
                    </div>
                    <div className="bg-slate-50/80 rounded-2xl p-5 md:p-6 border border-slate-200 min-h-[160px] shadow-inner">
                        {levels[activeLevel].content}
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('feed');

            const navItems = [
                { id: 'feed', icon: '📱', label: '핵심 피드' },
                { id: 'solution', icon: '📝', label: '기출 분석' },
                { id: 'sudoku', icon: '🧩', label: '스도쿠 훈련' },
                { id: 'venn', icon: '⭕', label: '복지 시각화' },
                { id: 'seesaw', icon: '⚖️', label: '시소 시뮬' }
            ];

            return (
                <div className="min-h-screen bg-slate-50 pb-28 text-slate-800 font-sans">
                    <header className="glass-panel sticky top-0 z-50 px-4 py-4 flex justify-center items-center">
                        <div className="max-w-3xl w-full flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-xl flex items-center justify-center text-white font-black text-2xl shadow-lg transform -rotate-3">S</div>
                                <div>
                                    <h1 className="font-black text-lg tracking-tight text-slate-800 leading-none">사문 1타.zip</h1>
                                    <p className="text-[10px] text-slate-500 font-bold mt-1">2027 수능특강 완벽 대비</p>
                                </div>
                            </div>
                            <div className="text-xs font-black bg-slate-800 text-yellow-300 px-4 py-2 rounded-full shadow-md animate-pulse-soft">
                                Premium
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-6">
                        
                        {/* 탭 1: 핵심 피드 */}
                        <div className={`tab-content ${activeTab === 'feed' ? 'active' : ''}`}>
                            <div className="mb-8 p-8 bg-gradient-to-br from-slate-800 via-indigo-900 to-blue-800 rounded-[2rem] text-white shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 opacity-10 text-9xl -translate-y-4 translate-x-4 mix-blend-overlay">📈</div>
                                <span className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold mb-4 inline-block backdrop-blur-sm border border-white/30">1등급 도약 플랜</span>
                                <h2 className="text-3xl md:text-4xl font-black mb-3 relative z-10 leading-tight">수능 사문 도표,<br/>이제 <span className="text-yellow-300">수학</span>으로 뚫습니다.</h2>
                                <p className="text-indigo-100 text-sm font-medium relative z-10 leading-relaxed mt-4 opacity-90">
                                    발문의 의도 파악, 미지수 설정, 그리고 새롭게 추가된 '인구 부양비' 공식까지!<br/>
                                    아래 피드들을 통해 핵심 무기를 장착하세요.
                                </p>
                            </div>

                            {}
                            <FeedCard title="인구 부양비와 노령화 지수 함정" tag="빈출 1위: 인구 구조" icon="👨‍👩‍👧‍👦" likes="28.9k">
                                <p className="text-slate-600 font-medium mb-4 text-sm leading-relaxed">
                                    "유소년 인구가 20% 감소하면 유소년 부양비도 20% 감소한다?" 절대 아닙니다! 분모인 '부양 인구'가 변했는지 확인해야 합니다.
                                </p>
                                <LevelLearner levels={[
                                    {
                                        title: "Lv.1 기준(분모) 잡기",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="mb-3 font-bold text-rose-600">🚨 부양비의 분모는 '전체 인구'가 아닙니다!</p>
                                                <ul className="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <li>• 유소년 부양비 = <Fraction num="유소년 인구" den={<span className="text-blue-600 font-bold">부양 인구(15~64)</span>} /> × 100</li>
                                                    <li>• 노년 부양비 = <Fraction num="노년 인구" den={<span className="text-blue-600 font-bold">부양 인구(15~64)</span>} /> × 100</li>
                                                    <li>• 총부양비 = 유소년 부양비 + 노년 부양비</li>
                                                    <li className="pt-2 border-t font-bold text-indigo-700 mt-2">
                                                        • 노령화 지수 = <Fraction num="노년 인구" den={<span className="text-emerald-600 font-bold">유소년 인구</span>} /> × 100
                                                    </li>
                                                </ul>
                                            </div>
                                        )
                                    },
                                    {
                                        title: "Lv.2 기출 함정 파훼",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="font-bold text-slate-800 mb-2">Q. 총부양비가 100이면?</p>
                                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 font-bold text-indigo-700">
                                                    식: <Fraction num="(유소년+노년)" den="부양 인구" /> × 100 = 100 <br/><br/>
                                                    즉, <b>(유소년+노년) = 부양 인구</b> 라는 뜻입니다.<br/>
                                                    이는 <b>전체 인구에서 부양 인구가 차지하는 비율이 정확히 50%</b>라는 엄청난 힌트가 됩니다!
                                                </div>
                                            </div>
                                        )
                                    },
                                    {
                                        title: "Lv.3 역추산 꿀팁 (비례식)",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="font-bold text-indigo-700 mb-2">💡 분수 비례식으로 전체 인구수 맞추기</p>
                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm leading-relaxed">
                                                    <p>노령화 지수가 50이면? 👉 노년 : 유소년 = 50 : 100 = <b className="text-rose-500">1 : 2</b></p>
                                                    <p>노년 부양비가 20이면? 👉 노년 : 부양인구 = 20 : 100 = <b className="text-blue-500">1 : 5</b></p>
                                                    <div className="my-2 border-t border-dashed border-slate-300"></div>
                                                    <p>이 두 비례식의 교집합인 '노년(1)'을 연결하면?<br/>
                                                    <b>유소년 : 부양인구 : 노년 = <span className="text-emerald-600 font-black text-lg">2 : 5 : 1</span></b> 이 됩니다!</p>
                                                    <p className="mt-2 text-xs text-slate-500">이제 인구를 20a, 50a, 10a로 세팅하면 모든 문제가 다 풀립니다.</p>
                                                </div>
                                            </div>
                                        )
                                    }
                                ]} />
                            </FeedCard>

                            {}
                            <FeedCard title="A에 대한 B의 비율" tag="수학적 사고 기초" icon="🧮" likes="18.5k">
                                <p className="text-slate-600 font-medium mb-4 text-sm leading-relaxed">
                                    가장 기초적이면서 가장 많이 틀리는 수능 1번 함정입니다. 분모/분자 위치를 헷갈리면 끝장입니다.
                                </p>
                                <LevelLearner levels={[
                                    {
                                        title: "Lv.1 공식 암기",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="mb-3"><b>'~에 대한', '대비'</b>가 붙은 쪽이 무조건 <b>기준(분모)</b>입니다.</p>
                                                <div className="bg-slate-800 p-4 rounded-xl text-center text-white shadow-sm flex flex-col items-center">
                                                    <span className="text-indigo-300 text-xs mb-2">A에 대한 B의 비율</span>
                                                    <Fraction num="B (비교하는 값)" den="A (기준이 되는 값)" className="text-lg text-yellow-300" />
                                                </div>
                                            </div>
                                        )
                                    },
                                    {
                                        title: "Lv.2 기출 변형",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="font-bold text-rose-600 mb-3">🚨 "자녀 세대 대비 부모 세대의 비율이 1 미만이다."</p>
                                                <ul className="bg-white p-4 rounded-lg border border-slate-200 space-y-3">
                                                    <li className="flex items-center gap-2">
                                                        <span className="font-bold text-slate-500">1. 수식화:</span> 
                                                        <Fraction num="부모 수" den="자녀 수" className="text-indigo-700" /> <span className="font-bold">&lt; 1</span>
                                                    </li>
                                                    <li className="flex items-center gap-2">
                                                        <span className="font-bold text-slate-500">2. 변형:</span>
                                                        <span className="font-bold bg-indigo-50 px-2 py-1 rounded">부모 수 &lt; 자녀 수</span> (양변에 자녀 수 곱하기)
                                                    </li>
                                                    <li className="pt-2 border-t font-black text-indigo-600">
                                                        👉 결론: 자녀 세대의 인구가 부모보다 더 많다!
                                                    </li>
                                                </ul>
                                            </div>
                                        )
                                    }
                                ]} />
                            </FeedCard>

                            <FeedCard title="분수 꼴로 제시된 비율 비(比) 타파하기" tag="고난도 발문 팁" icon="➗" likes="15.2k">
                                <p className="text-slate-600 font-medium mb-4 text-sm leading-relaxed">
                                    [질문 폭주!] "분수 형태로 나오면 어떻게 시작하죠?" <br/>
                                    분수를 가로 방정식으로 바꾸고 다중 미지수(a,b,c)를 도입하는 훈련이 필요합니다.
                                </p>
                                <LevelLearner levels={[
                                    {
                                        title: "Lv.1 분수 없애기",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <p className="mb-4">분수가 보이면 무조건 양변에 분모를 곱해서 <b>수평적인 비례식</b>으로 바꾸세요.</p>
                                                <div className="bg-rose-50 p-4 rounded-xl border border-rose-100 font-bold text-rose-700 shadow-sm text-center flex flex-col items-center">
                                                    <div className="flex items-center">
                                                        <Fraction num="을국 상층 비율" den="갑국 상층 비율" /> = 2
                                                    </div>
                                                    <span className="text-xl my-2">👇</span>
                                                    <span className="text-indigo-700">을국 상층 비율 = 갑국 상층 비율 × 2</span>
                                                </div>
                                            </div>
                                        )
                                    },
                                    {
                                        title: "Lv.2 다중 미지수(a, b, c) 도입",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm space-y-3">
                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                                    <p className="font-bold text-blue-600 mb-2">🚨 비율(%)은 같아도 인구수(명)는 다릅니다!</p>
                                                    <p>갑, 을, 병국 세 나라를 비교할 때 '전체 인구가 같다'는 단서가 없다면 <b>반드시 각각 다른 미지수</b>를 써야 합니다.</p>
                                                    <ul className="mt-3 space-y-1 bg-slate-50 p-3 rounded-lg text-indigo-700 font-bold border border-slate-100">
                                                        <li>갑국 총인구 = <span className="text-blue-500">100a</span> 명</li>
                                                        <li>을국 총인구 = <span className="text-rose-500">100b</span> 명</li>
                                                        <li>병국 총인구 = <span className="text-emerald-500">100c</span> 명</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        )
                                    },
                                    {
                                        title: "Lv.3 실전 결합 (절댓값 구하기)",
                                        content: (
                                            <div className="animate-fade-in text-slate-700 text-sm">
                                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                                                    <p className="font-black text-indigo-700 mb-2">💡 미지수와 비율의 콜라보</p>
                                                    <p className="mb-2">Lv.1에서 구한 <b>'을국 상층 비율 = 갑국 상층 비율 × 2'</b>를 인구수로 바꿔볼까요?</p>
                                                    <ul className="bg-white p-3 rounded-lg space-y-2 text-xs font-bold border border-indigo-100 leading-relaxed">
                                                        <li>갑국 상층 비율을 <span className="text-rose-500">k%</span> 라고 가정하면, 을국 상층 비율은 <span className="text-rose-500">2k%</span></li>
                                                        <li className="flex items-center">
                                                            1. 갑국 상층 인구 = 100a × <Fraction num="k" den="100" /> = <span className="text-blue-600 ml-1 text-sm">ak 명</span>
                                                        </li>
                                                        <li className="flex items-center">
                                                            2. 을국 상층 인구 = 100b × <Fraction num="2k" den="100" /> = <span className="text-blue-600 ml-1 text-sm">2bk 명</span>
                                                        </li>
                                                        <li className="mt-2 pt-2 border-t text-indigo-800 text-sm">
                                                            👉 이제 a와 b의 관계(예: "을국 총인구가 갑국의 2배이다" → b=2a)만 알면 정확한 명수를 비교할 수 있습니다!
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>
                                        )
                                    }
                                ]} />
                            </FeedCard>
                        </div>

                        {}
                        <div className={`tab-content ${activeTab === 'solution' ? 'active' : ''}`}>
                            <div className="mb-8 p-6 md:p-8 bg-white rounded-[2rem] border-2 border-indigo-100 shadow-sm relative overflow-hidden">
                                <h2 className="text-2xl font-black mb-2 text-slate-800">수능 기출 유형 분석 & 첫 단추 꿰기</h2>
                                <p className="text-slate-500 text-sm font-medium mb-6">수능특강과 평가원 모의고사 기출을 바탕으로, "어디서부터 손대야 할지 모르는" 문제를 타파합니다.</p>
                                
                                <div className="space-y-8">
                                    <div className="bg-slate-50 rounded-2xl p-5 md:p-6 border border-slate-200">
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="bg-indigo-600 text-white text-xs font-bold px-2 py-1 rounded">유형 1</span>
                                            <h3 className="font-bold text-lg text-slate-800">국가 간 계층 구조 비교 (상대비율 제시형)</h3>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 mb-4 shadow-sm">

        // ==========================================
        // 탭 5: 가중평균 시소 시뮬레이터
        // ==========================================
        function SeesawApp() {
            const [sliderA, setSliderA] = useState(15);
            const [sliderB, setSliderB] = useState(85);
            const [sliderTotal, setSliderTotal] = useState(30);

            useEffect(() => {
                if (sliderTotal <= sliderA) setSliderTotal(sliderA + 1);
                if (sliderTotal >= sliderB) setSliderTotal(sliderB - 1);
                if (sliderA >= sliderB) setSliderB(sliderA + 10);
            }, [sliderA, sliderB, sliderTotal]);

            const distA = Math.abs(sliderTotal - sliderA);
            const distB = Math.abs(sliderB - sliderTotal);
            
            const totalDist = distA + distB;
            const popRatioA = Math.round((distB / totalDist) * 100);
            const popRatioB = Math.round((distA / totalDist) * 100);

            const recValA = distB * sliderA;
            const recValB = distA * sliderB;
            const totalRec = recValA + recValB;
            const recRatioA = Math.round((recValA / totalRec) * 100);
            const recRatioB = Math.round((recValB / totalRec) * 100);

            const fulcrumPos = ((sliderTotal - sliderA) / (sliderB - sliderA)) * 100;
            const tiltAngle = (50 - fulcrumPos) * 0.2; 

            return (
                <div className="animate-fade-in pb-10">
                    <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 relative overflow-hidden">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h2 className="text-2xl font-black mb-1 text-slate-800">가중평균 시소 시뮬레이터</h2>
                                <p className="text-slate-500 text-sm font-medium">받침점(전체평균)을 조작하여 숨겨진 <b>인구수 비례</b>와 <b>실제 수급자 수 비례</b>를 찾아보세요.</p>
                            </div>
                            <span className="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider border border-rose-200">Pro</span>
                        </div>

                        <div className="bg-slate-50 p-6 md:p-10 rounded-3xl border border-slate-200 mb-8 relative">
                            <div className="flex justify-between items-end mb-20 text-center px-1">
                                <div className="bg-white px-3 py-3 rounded-2xl shadow-sm border border-blue-100 min-w-[70px]">
                                    <div className="text-[9px] font-bold text-slate-400 mb-1">A지역 수급률</div>
                                    <div className="text-xl md:text-2xl font-black text-blue-600">{sliderA}%</div>
                                </div>
                                <div className="bg-white px-5 py-4 rounded-2xl shadow-md border-2 border-emerald-400 transform scale-110 z-10 relative mx-2">
                                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full whitespace-nowrap shadow-sm">전체 평균</div>
                                    <div className="text-3xl font-black text-emerald-500">{sliderTotal}%</div>
                                </div>
                                <div className="bg-white px-3 py-3 rounded-2xl shadow-sm border border-rose-100 min-w-[70px]">
                                    <div className="text-[9px] font-bold text-slate-400 mb-1">B지역 수급률</div>
                                    <div className="text-xl md:text-2xl font-black text-rose-600">{sliderB}%</div>
                                </div>
                            </div>

                            <div className="relative h-44 flex items-end justify-center mb-8 px-4">
                                <div className="absolute top-0 w-full px-4 flex text-[11px] font-black text-slate-500">
                                    <div className="border-b-2 border-dashed border-blue-300 relative flex justify-center pb-2" style={{ width: `${fulcrumPos}%` }}>
                                        거리: {distA}
                                    </div>
                                    <div className="border-b-2 border-dashed border-rose-300 relative flex justify-center pb-2" style={{ width: `${100 - fulcrumPos}%` }}>
                                        거리: {distB}
                                    </div>
                                </div>

                                <div className="w-full relative z-10 transition-transform duration-300 ease-out origin-bottom" style={{ transform: `rotate(${tiltAngle}deg)` }}>
                                    <div className="absolute left-0 bottom-4 flex flex-col items-center z-20" style={{ transform: `scale(${Math.max(0.7, popRatioA / 50)})`, transformOrigin: 'bottom left', transition: 'transform 0.3s ease-out' }}>
                                        <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white font-black px-4 py-3 rounded-xl shadow-lg border border-blue-400 text-center min-w-[70px]">
                                            <span className="text-[9px] opacity-80 block mb-0.5">인구(무게) 비</span>
                                            <span className="text-lg">{popRatioA}</span>
                                        </div>
                                    </div>
                                    <div className="absolute right-0 bottom-4 flex flex-col items-center z-20" style={{ transform: `scale(${Math.max(0.7, popRatioB / 50)})`, transformOrigin: 'bottom right', transition: 'transform 0.3s ease-out' }}>
                                        <div className="bg-gradient-to-br from-rose-400 to-rose-500 text-white font-black px-4 py-3 rounded-xl shadow-lg border border-rose-400 text-center min-w-[70px]">
                                            <span className="text-[9px] opacity-80 block mb-0.5">인구(무게) 비</span>
                                            <span className="text-lg">{popRatioB}</span>
                                        </div>
                                    </div>

                                    <div className="w-full h-4 bg-slate-300 rounded-full shadow-inner border border-white"></div>
                                </div>

                                <div className="absolute bottom-[-20px] z-30 transition-all duration-300 ease-out w-full px-4">
                                    <div className="relative w-full h-full">
                                        <div className="absolute transition-all duration-300 ease-out" style={{ left: `${fulcrumPos}%`, transform: 'translateX(-50%)' }}>
                                            <div className="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-b-[30px] border-b-emerald-500 filter drop-shadow-md"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-14 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100 relative">
                                <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md whitespace-nowrap">
                                    가운데 원을 좌우로 드래그
                                </div>
                                <input 
                                    type="range" min={sliderA + 1} max={sliderB - 1} value={sliderTotal} 
                                    onChange={(e) => setSliderTotal(Number(e.target.value))}
                                    className="w-full h-3 bg-slate-200 rounded-full appearance-none cursor-pointer mt-2"
                                />
                            </div>
                        </div>

                        <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-lg animate-fade-in mt-8">
                            <div className="bg-slate-900 px-5 py-3 border-b border-slate-700 flex justify-between items-center">
                                <h4 className="font-bold text-white text-sm flex items-center gap-2">
                                    <span className="bg-emerald-500 w-2 h-2 rounded-full animate-pulse"></span> 실시간 자동 도출 데이터
                                </h4>
                                <span className="text-slate-400 text-[10px] md:text-xs font-medium">수능 선지 판별용</span>
                            </div>
                            
                            <div className="p-5 space-y-4">
                                <div className="flex justify-between items-center bg-slate-700/30 p-3 rounded-xl border border-slate-600/50">
                                    <div className="flex items-center gap-2 text-slate-300 text-sm font-bold">
                                        <span className="text-lg">📏</span> 거리의 비 (A : B)
                                    </div>
                                    <div className="font-black text-white text-lg">
                                        <span className="text-blue-400">{distA}</span> : <span className="text-rose-400">{distB}</span>
                                    </div>
                                </div>
                                
                                <div className="flex justify-between items-center bg-indigo-900/40 p-3 rounded-xl border border-indigo-700/50">
                                    <div className="flex items-center gap-2 text-indigo-200 text-sm font-bold">
                                        <span className="text-lg">👥</span> <span className="underline decoration-indigo-400">인구 수</span>의 비 (A : B)
                                    </div>
                                    <div className="font-black text-white text-lg text-right">
                                        <span className="text-blue-400">{distB}</span> : <span className="text-rose-400">{distA}</span><br/>
                                        <span className="text-[10px] text-slate-400 font-normal bg-slate-800 px-2 py-0.5 rounded-full inline-block mt-1">거리비의 역수</span>
                                    </div>
                                </div>

                                <div className="flex justify-between items-start md:items-center bg-emerald-900/30 p-4 rounded-xl border border-emerald-700/50 flex-col md:flex-row gap-3">
                                    <div className="flex items-center gap-2 text-emerald-200 text-sm font-bold">
                                        <span className="text-xl">💰</span> 실제 <span className="text-white bg-emerald-600 px-1.5 rounded mx-1">수급자 수</span>의 비 (A : B)
                                    </div>
                                    <div className="text-right w-full md:w-auto">
                                        <div className="font-black text-white text-xl">
                                            <span className="text-blue-400">{recRatioA}</span> : <span className="text-rose-400">{recRatioB}</span>
                                        </div>
                                        <div className="text-[10px] text-emerald-300 font-bold mt-1">
                                            계산: (인구 비례 × 각 지역 수급률)
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
